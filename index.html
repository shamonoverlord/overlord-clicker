<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlord Clicker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">

    <!-- Header -->
    <header id="header">
        <div id="stage-display">
            Stage 1
        </div>

    <button id="boss-button">
        ボス戦へ移動
    </button>
    </header>

    <!-- Battlefield -->
    <main id="battlefield">

        <div id="left-allies">
            左味方
        </div>

<div id="enemy-area">

    <div id="enemy-hp-container">
        <div id="enemy-hp-bar"></div>

        <div id="enemy-info-on-bar">
            <span id="enemy-name">スライム</span>
            <span id="enemy-hp-text">100 / 100</span>
        </div>
    </div>

    <div id="boss-time-container">
        <div id="boss-time-bar"></div>
    </div>
    
    <div id="enemy-image">

        <img
            id="enemy-sprite"
            src="img/enemies/e001_slime_green.png"
            alt="Slime"
        >

    </div>
    
</div>

        <div id="right-allies">
            右味方
        </div>

<div id="player-area">

    <img
        id="player-sprite"
        src="img/player/enri.png"
        alt="Enri"
    >

</div>

    </main>

<!-- Info Area -->
<section id="info-area">

    <div class="info-row">
        金貨：<span id="gold">0</span>
    </div>

    <div class="info-row">
        DPS：<span id="dps">0</span>
    </div>

</section>

    <!-- Skills -->
    <section id="skills">

        <button class="skill-btn">Skill 1</button>
        <button class="skill-btn">Skill 2</button>
        <button class="skill-btn">Skill 3</button>

    </section>

    <!-- Tabs -->
    <nav id="tabs">

        <button class="tab-btn">Home</button>
        <button class="tab-btn">Character</button>
        <button class="tab-btn">Equipment</button>
        <button class="tab-btn">Gacha</button>
        <button class="tab-btn">Settings</button>

    </nav>

    <script src="main.js"></script>

</div>

</body>
</html>
